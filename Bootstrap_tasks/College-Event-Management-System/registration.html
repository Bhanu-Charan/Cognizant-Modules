<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Event Registration - CampusFest 2026</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
    font-family:'Segoe UI',sans-serif;
}

.header{
    background:linear-gradient(135deg,#0d6efd,#6610f2);
    color:white;
    padding:50px 20px;
    text-align:center;
}

.register-card{
    max-width:700px;
    margin:auto;
    margin-top:40px;
    margin-bottom:40px;
    border-radius:15px;
}

footer{
    background:#212529;
    color:white;
    text-align:center;
    padding:15px;
}
</style>

</head>
<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand fw-bold" href="index.html">
🎓 CampusFest 2026
</a>

<button class="navbar-toggler" type="button"
data-bs-toggle="collapse"
data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link" href="index.html">Home</a>
</li>

<li class="nav-item">
<a class="nav-link" href="events.html">Events</a>
</li>

<li class="nav-item">
<a class="nav-link" href="gallery.html">Gallery</a>
</li>

<li class="nav-item">
<a class="nav-link active" href="registration.html">Registration</a>
</li>

<li class="nav-item">
<a class="nav-link" href="contact.html">Contact</a>
</li>

<li class="nav-item">
    <a class="nav-link" href="schedule.html">Schedule</a>
</li>

<li class="nav-item">
    <a class="nav-link" href="faq.html">FAQ</a>
</li>

</ul>
</div>

</div>
</nav>

<!-- Header -->

<div class="header">
<h1>Event Registration</h1>
<p>Register and be part of CampusFest 2026</p>
</div>

<!-- Success Alert -->

<div class="container mt-4">
<div id="successMsg" class="alert alert-success d-none" role="alert">
✅ Registration Successful! Thank you for registering.
</div>
</div>

<!-- Registration Form -->

<div class="container">

<div class="card shadow register-card">

<div class="card-body p-4">

<h3 class="text-center mb-4">
Student Registration Form
</h3>

<form id="registrationForm">

<div class="mb-3">
<label class="form-label">Student Name</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Roll Number</label>
<input type="text" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Branch</label>
<select class="form-select" required>
<option value="">Select Branch</option>
<option>CSE</option>
<option>CSM</option>
<option>ECE</option>
<option>EEE</option>
<option>IT</option>
<option>MECH</option>
<option>CIVIL</option>
</select>
</div>

<div class="mb-3">
<label class="form-label">Email Address</label>
<input type="email" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Mobile Number</label>
<input type="tel" class="form-control" required>
</div>

<div class="mb-3">
<label class="form-label">Select Event</label>
<select class="form-select" required>
<option value="">Choose Event</option>
<option>Hackathon</option>
<option>Technical Quiz</option>
<option>Poster Presentation</option>
<option>Coding Contest</option>
<option>Project Expo</option>
<option>Cultural Fest</option>
</select>
</div>

<div class="d-grid">
<button type="submit" class="btn btn-primary btn-lg">
Register Now
</button>
</div>

</form>

</div>
</div>

</div>

<!-- Footer -->

<footer>
CampusFest 2026 © All Rights Reserved
</footer>

<script>
document.getElementById("registrationForm").addEventListener("submit", function(e){

e.preventDefault();

document.getElementById("successMsg").classList.remove("d-none");

this.reset();

window.scrollTo({
top:0,
behavior:"smooth"
});

});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
