<!-- Contact Section -->
<section class="container py-5">

    <h1 class="text-center mb-5">Contact Me</h1>

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card shadow">
                <div class="card-body p-4">

                    <form>

                        <!-- Name -->
                        <div class="mb-3">
                            <label class="form-label">
                                Name
                            </label>
                            <input type="text"
                                class="form-control"
                                placeholder="Enter your name"
                                required>
                        </div>

                        <!-- Email -->
                        <div class="mb-3">
                            <label class="form-label">
                                Email
                            </label>
                            <input type="email"
                                class="form-control"
                                placeholder="Enter your email"
                                required>
                        </div>

                        <!-- Subject -->
                        <div class="mb-3">
                            <label class="form-label">
                                Subject
                            </label>
                            <input type="text"
                                class="form-control"
                                placeholder="Enter subject"
                                required>
                        </div>

                        <!-- Message -->
                        <div class="mb-3">
                            <label class="form-label">
                                Message
                            </label>
                            <textarea class="form-control"
                                rows="5"
                                placeholder="Enter your message"
                                required></textarea>
                        </div>

                        <!-- Submit Button -->
                        <div class="text-center">
                            <button type="submit"
                                class="btn btn-primary btn-lg">
                                Send Message
                            </button>
                        </div>

                    </form>

                </div>
            </div>

        </div>

    </div>

</section>
